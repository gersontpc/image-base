include: distroless/image-base.yaml
contents:
  packages:
    - nodejs-24
    - npm
    # npm's scripts start with `#!/usr/bin/env node`; busybox provides
    # /usr/bin/env, otherwise npm fails with "bad interpreter".
    - busybox

work-dir: /app

accounts:
  groups:
    - groupname: appuser
      gid: 10000
  users:
    - username: appuser
      uid: 10000
      gid: 10000
  run-as: appuser

paths:
  - path: /app
    type: directory
    uid: 10000
    gid: 10000
