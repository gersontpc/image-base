apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-distroless-app
  labels:
    app: distroless-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: distroless-app
  template:
    metadata:
      labels:
        app: distroless-app
    spec:
      containers:
        - name: distroless-app
          image: gersontpc/k8s-pod:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "1024Mi"
              cpu: "500m"
            limits:
              memory: "1520Mi"
              cpu: "500m"