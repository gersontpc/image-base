name: Build & Push Base Images (reusable)

on:
  workflow_call:
    inputs:
      registry:
        description: "Docker Hub namespace/repository prefix the images are pushed to"
        type: string
        default: gersontpc
      frameworks:
        description: "JSON array of frameworks to build (must match a file in frameworks/<name>.yaml). Two supported versions per language."
        type: string
        default: '["java21", "java25", "python3-13", "python3-14", "go1-25", "go1-26", "nodejs22", "nodejs24"]'
    secrets:
      DOCKERHUB_TOKEN:
        required: true

env:
  REGISTRY: ${{ inputs.registry }}

jobs:
  # Builds the melange/bundle-pem-test.yaml package (bundle.pem apk) once and
  # shares it with every framework build below via an artifact, so it isn't
  # rebuilt 4x. Uses an ephemeral signing key: only the public key travels to
  # the build-push job, just enough for apko to verify the local repository.
  melange-bundle:
    name: Compile certs with melange
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Generate ephemeral melange signing key
        working-directory: melange
        run: |
          docker run --rm -v "$PWD":/work -w /work cgr.dev/chainguard/melange:latest \
            keygen melange.rsa

      - name: Build bundle-pem-test package (amd64 + arm64)
        working-directory: melange
        run: |
          docker run --privileged --rm -v "$PWD":/work -w /work cgr.dev/chainguard/melange:latest \
            build bundle-pem-test.yaml \
            --arch x86_64,aarch64 \
            --signing-key melange.rsa

      - name: Upload melange repository
        uses: actions/upload-artifact@v4
        with:
          name: melange-repo
          path: |
            melange/packages/
            melange/melange.rsa.pub
          retention-days: 1

  build-push:
    name: Build & push ${{ matrix.framework }}
    needs: melange-bundle
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: ${{ fromJSON(inputs.frameworks) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # apko is extracted as a native binary (instead of running it via
      # `docker run`) so it transparently picks up the credentials that
      # docker/login-action just wrote to ~/.docker/config.json - no volume
      # mounts to fake a container HOME needed. Pulling ":latest" here keeps
      # it on the latest stable apko release.
      - name: Install apko (latest stable)
        run: |
          set -eu
          docker create --name apko-extract cgr.dev/chainguard/apko:latest
          docker cp apko-extract:/usr/bin/apko ./apko
          docker rm apko-extract
          chmod +x ./apko
          ./apko version

      - name: Download melange repository
        uses: actions/download-artifact@v4
        with:
          name: melange-repo
          path: melange-repo

      # Image reference: gersontpc/image-base-<framework>, tagged "stable"
      # (not "latest") plus an immutable <commit-hash>-<timestamp> tag.
      - name: Set image name and tags
        env:
          FRAMEWORK: ${{ matrix.framework }}
        run: |
          set -eu
          echo "IMAGE_NAME=${REGISTRY}/image-base-${FRAMEWORK}" >> "$GITHUB_ENV"
          echo "COMMIT_TAG=$(echo "$GITHUB_SHA" | cut -c1-7)-$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"

      # Local-only build (no registry involved) so the image can be scanned
      # before anything is published. apko builds are reproducible, so the
      # digest `apko publish` pushes later is bit-for-bit identical to what
      # gets scanned here.
      - name: Build image for each architecture (local validation)
        run: |
          set -eu
          declare -A ARCH_MAP=( [x86_64]=amd64 [aarch64]=arm64 )
          for APKO_ARCH in x86_64 aarch64; do
            OCI_ARCH="${ARCH_MAP[$APKO_ARCH]}"
            echo "Building ${IMAGE_NAME} for ${APKO_ARCH}"
            ./apko build \
              --arch "$APKO_ARCH" \
              --repository-append melange-repo/packages \
              --keyring-append melange-repo/melange.rsa.pub \
              "frameworks/${{ matrix.framework }}.yaml" "${IMAGE_NAME}" "${{ matrix.framework }}-${OCI_ARCH}.tar"
            docker load < "${{ matrix.framework }}-${OCI_ARCH}.tar"
          done

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:latest-amd64"
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      # Only reached once the scan above passed. `apko publish` builds and
      # pushes a single multi-arch index in one shot (both tags at once), so
      # unlike `docker manifest create` it never creates separate/visible
      # latest-amd64 / latest-arm64 tags on the registry.
      - name: Publish multi-arch image
        run: |
          set -eu
          ./apko publish \
            --arch x86_64,aarch64 \
            --repository-append melange-repo/packages \
            --keyring-append melange-repo/melange.rsa.pub \
            "frameworks/${{ matrix.framework }}.yaml" \
            "${IMAGE_NAME}:stable" \
            "${IMAGE_NAME}:${COMMIT_TAG}"
