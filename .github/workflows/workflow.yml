name: Build & Push Multi-Arch Distroless Image

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  schedule:
    - cron: "0 22 * * *"  # roda todo dia à 00:00 UTC

jobs:
  build-base-images:
    uses: ./.github/workflows/build-base-images.yml
    with:
      registry: gersontpc
      frameworks: '["java21", "python3", "go", "nodejs"]'
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}