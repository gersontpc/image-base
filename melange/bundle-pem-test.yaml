# melange package definition that builds a local apk containing the
# Mozilla CA certificate bundle (bundle.pem), fetched from the curl.se
# distribution (the standard PEM export of Mozilla's trusted root store).
#
# This exists to validate the melange -> apko pipeline (custom package
# built by melange, consumed by apko via a local repository) and to give
# every image an additional, self-contained bundle.pem alongside the
# official ca-certificates-bundle package already present in
# distroless/image-base.yaml.
package:
  name: bundle-pem-test
  version: 0.1.0
  epoch: 0
  description: "Mozilla CA certificate bundle (bundle.pem), sourced from the curl.se PEM export of Mozilla's trusted root store"
  copyright:
    - license: MPL-2.0

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - ca-certificates
      - curl

pipeline:
  - name: Download Mozilla CA bundle (bundle.pem)
    runs: |
      set -eu
      install -d "${{targets.destdir}}"/etc/ssl/certs
      curl -fsSL https://curl.se/ca/cacert.pem -o "${{targets.destdir}}"/etc/ssl/certs/bundle.pem
      test -s "${{targets.destdir}}"/etc/ssl/certs/bundle.pem
      grep -q "BEGIN CERTIFICATE" "${{targets.destdir}}"/etc/ssl/certs/bundle.pem
      chmod 0644 "${{targets.destdir}}"/etc/ssl/certs/bundle.pem
